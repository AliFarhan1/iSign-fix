name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: List files (For Debugging)
      # هذا الأمر سيطبع الملفات للتأكد من المسار إذا فشل البناء مرة أخرى
      run: ls -R

    - name: Build iOS App
      run: |
        # سنستخدم البحث التلقائي عن ملف المشروع لضمان الوصول إليه
        PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
        SCHEME_NAME=$(xcodebuild -list -project "$PROJECT_PATH" | grep -A 5 "Schemes:" | tail -n 1 | xargs)
        
        echo "Found Project: $PROJECT_PATH"
        echo "Found Scheme: $SCHEME_NAME"
        
        xcodebuild build \
          -project "$PROJECT_PATH" \
          -scheme "$SCHEME_NAME" \
          -sdk iphoneos \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO
