name: iOS Build and Export

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set Xcode Version
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Archive App
      run: |
        xcodebuild archive \
          -project "iSign/iSign.xcodeproj" \
          -scheme "iSign" \
          -archivePath "build/iSign.xcarchive" \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

    - name: Create IPA (Ad-hoc/Testing)
      run: |
        mkdir -p build/Payload
        cp -r "build/iSign.xcarchive/Products/Applications/iSign.app" build/Payload/
        cd build && zip -r iSign.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iSign-IPA
        path: build/iSign.ipa
