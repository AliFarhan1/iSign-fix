name: iOS Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Build and Archive
      run: |
        xcodebuild archive \
          -project "iSign/iSign.xcodeproj" \
          -scheme "iSign" \
          -archivePath "build/iSign.xcarchive" \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

    - name: Export IPA
      run: |
        mkdir -p build/Payload
        cp -r "build/iSign.xcarchive/Products/Applications/iSign.app" build/Payload/
        cd build && zip -r iSign.ipa Payload

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: iSign-Fixed-App
        path: build/iSign.ipa
