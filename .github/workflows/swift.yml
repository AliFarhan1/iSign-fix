name: iOS Universal Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Find and Build Project
      run: |
        # البحث عن ملف المشروع تلقائياً
        PROJ_PATH=$(find . -name "*.xcodeproj" -not -path "*/.*" | head -n 1)
        PROJ_DIR=$(dirname "$PROJ_PATH")
        PROJ_NAME=$(basename "$PROJ_PATH")
        # استخراج اسم الـ Scheme تلقائياً
        SCHEME_NAME=$(xcodebuild -list -project "$PROJ_PATH" | grep -A 5 "Schemes:" | tail -n 1 | xargs)
        
        echo "Building Project: $PROJ_NAME in $PROJ_DIR with Scheme: $SCHEME_NAME"
        
        xcodebuild archive \
          -project "$PROJ_PATH" \
          -scheme "$SCHEME_NAME" \
          -archivePath "build/iSign.xcarchive" \
          -sdk iphoneos \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

    - name: Create IPA
      run: |
        mkdir -p output/Payload
        APP_PATH=$(find build/iSign.xcarchive -name "*.app" | head -n 1)
        cp -r "$APP_PATH" output/Payload/
        cd output && zip -r iSign_Final.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: iSign-App
        path: output/iSign_Final.ipa
