name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # يجب استخدام macos لأن xcodebuild لا يعمل على linux
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set default Xcode version
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Build iOS App
      # استبدل iSign باسم مشروعك إذا كان مختلفاً
      run: |
        xcodebuild build \
          -project "iSign.xcodeproj" \
          -scheme "iSign" \
          -sdk iphoneos \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO
