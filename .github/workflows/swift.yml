name: iOS Build Fixed

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and Archive
        run: |
          PROJ_PATH=$(find . -name "*.xcodeproj" -not -path "*/.*" | head -n 1)
          if [ -z "$PROJ_PATH" ]; then echo "Project not found"; exit 1; fi
          
          SCHEME_NAME=$(xcodebuild -list -project "$PROJ_PATH" | grep -A 5 "Schemes:" | tail -n 1 | xargs)
          
          xcodebuild archive \
            -project "$PROJ_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath "build/iSign.xcarchive" \
            -sdk iphoneos \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA File
        run: |
          mkdir -p output/Payload
          APP_PATH=$(find build/iSign.xcarchive -name "*.app" | head -n 1)
          cp -r "$APP_PATH" output/Payload/
          cd output && zip -r iSign_Final.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iSign-App
          path: output/iSign_Final.ipa
