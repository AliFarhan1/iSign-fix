name: iOS Build Fixed

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Clean and Build
      run: |
        # تنظيف المجلدات قبل البناء
        xcodebuild clean -project "iSign/iSign.xcodeproj" -scheme "iSign"
        
        # بناء الأرشيف مع تجاهل أخطاء التوقيع
        xcodebuild archive \
          -project "iSign/iSign.xcodeproj" \
          -scheme "iSign" \
          -archivePath "build/iSign.xcarchive" \
          -sdk iphoneos \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO

    - name: Prepare IPA
      run: |
        mkdir -p output/Payload
        # البحث عن ملف الـ .app ونسخه بغض النظر عن مكانه
        APP_PATH=$(find build/iSign.xcarchive -name "*.app" | head -n 1)
        cp -r "$APP_PATH" output/Payload/
        cd output && zip -r iSign_Fixed.ipa Payload

    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: iSign-Working-Version
        path: output/iSign_Fixed.ipa
